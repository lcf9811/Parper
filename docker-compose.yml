# WAgent 生产部署 - Docker Compose

version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: wagent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wagent_prod_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cc_water_db}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - wagent-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  # WAgent 后端 + 前端
  wagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wagent-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8787
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wagent_prod_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cc_water_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      JWT_SECRET: ${JWT_SECRET}
      SCADA_API_TOKEN: ${SCADA_API_TOKEN}
      NODE_ENV: production
    ports:
      - "8787:8787"
    volumes:
      # 持久化 skills 和 scripts 目录（可选挂载本地修改）
      # - ./skills:/app/skills
      # - ./scripts:/app/scripts
      # 日志
      - wagent_logs:/app/server/logs
    networks:
      - wagent-net

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: wagent-nginx
    restart: unless-stopped
    depends_on:
      - wagent
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/config/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL 证书（如果使用 HTTPS）
      # - ./deploy/config/ssl:/etc/nginx/ssl:ro
    networks:
      - wagent-net

volumes:
  mysql_data:
  wagent_logs:

networks:
  wagent-net:
    driver: bridge
